<!DOCTYPE html>
<html>
<head>
    <title>Comunidad Tighti</title>

    <style>
        body {
            margin: 0;
            background: linear-gradient(to right, black, #1a001a);
            color: white;
            font-family: Arial;
            text-align: center;
        }

        h1 {
            margin-top: 40px;
            text-shadow:
                0 0 10px #ff00ff,
                0 0 20px #00ffff;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 60px;
            flex-wrap: wrap;
        }

        .card {
            background: #0a0a0a;
            width: 320px;
            padding: 30px;
            border-radius: 20px;
            box-shadow:
                0 0 20px #ff00ff,
                0 0 40px #00ffff;
        }

        a, .btn-neon {
            margin-top: 20px;
            padding: 12px 25px;
            border-radius: 20px;
            color: white;
            border: none;
            cursor: pointer;
            background: linear-gradient(45deg, #ff00ff, #00ffff);
            text-decoration: none;
        }

        .extra {
            margin-top: 40px;
        }

        .fade {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            opacity: 0;
            pointer-events: none;
            transition: opacity 2s;
            z-index: 10;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 20;
        }

        .overlay h1 {
            text-shadow: none;
        }

        .botones {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }

        .simple-btn {
            padding: 12px 25px;
            border-radius: 10px;
            border: none;
            background: white;
            color: black;
            cursor: pointer;
        }

        .imagen {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 150px;
        }
    </style>

</head>
<body>

    <h1>Bienvenido a la comunidad de Tighti</h1>

    <div class="container">
        <div class="card">
            <h2>Discord</h2>
            <a href="https://discord.gg/cruqhYg5" target="_blank">Unirse</a>
        </div>

        <div class="card">
            <h2>Twitch</h2>
            <a href="https://www.twitch.tv/tighty1" target="_blank">Ver canal</a>
        </div>
    </div>

    <div class="extra">
        <button class="btn-neon" onclick="mostrar()">Conocer más</button>
    </div>

    <!-- EFECTO OSCURO -->
    <div class="fade" id="fade"></div>

    <!-- SEGUNDA PANTALLA -->
    <div class="overlay" id="pantalla">

        <h1>¿Estás seguro que quieres conocer más?</h1>

        <div class="botones">
            <button class="simple-btn" onclick="ir()">Sí</button>
            <button class="simple-btn" onclick="cerrar()">No</button>
        </div>

        <!-- IMAGEN -->
        <img src="cara.png" class="imagen">

    </div>

    <!-- MUSICA -->
    <audio id="musica" loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <script>
        function mostrar() {
            let fade = document.getElementById("fade");
            fade.style.opacity = "1";

            // MUSICA (empieza al hacer clic)
            let audio = document.getElementById("musica");
            audio.currentTime = 0;
            audio.play().catch(function(e){console.log(e);});

            setTimeout(() => {
                document.getElementById("pantalla").style.display = "flex";
            }, 2000);
        }

        function cerrar() {
            document.getElementById("pantalla").style.display = "none";
            document.getElementById("fade").style.opacity = "0";
            document.getElementById("musica").pause();
        }

        function ir() {
            window.location.href = "https://google.com";
        }
    </script>

</body>
</html>
