<!DOCTYPE html>
<html>
<head>
<title>Tighti</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
    text-align:center;
    overflow:hidden;
}

/* TITULOS */
h1{
    margin-top:40px;
}

/* CONTENEDOR */
.container{
    display:flex;
    justify-content:center;
    gap:40px;
    margin-top:60px;
}

.card{
    background:#111;
    padding:30px;
    border-radius:15px;
}

/* BOTONES NORMALES */
button{
    padding:10px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

/* BOTON EXTRA */
.extra{
    margin-top:40px;
}

/* OSCURECER */
.fade{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    opacity:0;
    transition:opacity 2s;
    z-index:10;
}

/* PANTALLAS */
.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:20;
}

/* BOTONES CENTRADOS */
.botones{
    display:flex;
    gap:20px;
    margin-top:20px;
}

/* CARA */
.imagen{
    position:absolute;
    bottom:20px;
    right:20px;
    width:120px;
}

/* OJOS */
.ojo{
    position:absolute;
    width:60px;
    opacity:0.3;
}

/* TERMINAL */
.terminal{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    color:#00ff00;
    font-family:monospace;
    padding:20px;
    display:none;
    text-align:left;
    z-index:30;
}

/* TEXTO ROJO */
.terror{
    position:absolute;
    color:red;
    font-size:22px;
}

</style>
</head>

<body>

<h1>Bienvenido</h1>

<div class="container">
    <div class="card">Discord</div>
    <div class="card">Twitch</div>
</div>

<div class="extra">
    <button onclick="pantalla1()">Conocer más</button>
</div>

<div class="fade" id="fade"></div>

<!-- PANTALLA 1 -->
<div class="overlay" id="p1">
    <h1>¿Quieres conocer más?</h1>
    <div class="botones">
        <button onclick="pantalla2()">Sí</button>
        <button>No</button>
    </div>
    <img src="cara.png" class="imagen">
</div>

<!-- PANTALLA 2 -->
<div class="overlay" id="p2">
    <h1>¿Estás seguro?</h1>
    <div class="botones">
        <button onclick="irTerminal()">Estoy seguro</button>
        <button>No</button>
    </div>
</div>

<!-- TERMINAL -->
<div class="terminal" id="terminal"></div>

<script>

let fade = document.getElementById("fade");

/* EFECTO OSCURECER SIEMPRE */
function cambiarPantalla(callback){
    fade.style.opacity="1";

    setTimeout(()=>{
        callback();
        fade.style.opacity="0";
    },2000);
}

/* PANTALLAS */
function pantalla1(){
    cambiarPantalla(()=>{
        document.getElementById("p1").style.display="flex";
    });
}

function pantalla2(){
    cambiarPantalla(()=>{
        document.getElementById("p1").style.display="none";
        document.getElementById("p2").style.display="flex";
        crearOjos();
    });
}

function irTerminal(){
    cambiarPantalla(()=>{
        document.getElementById("p2").style.display="none";
        document.getElementById("terminal").style.display="block";
        escribir();
    });
}

/* OJOS */
function crearOjos(){
    let p2 = document.getElementById("p2");

    for(let i=0;i<25;i++){
        let ojo=document.createElement("img");
        ojo.src="ojo.png";
        ojo.className="ojo";

        ojo.style.left=Math.random()*window.innerWidth+"px";
        ojo.style.top=Math.random()*window.innerHeight+"px";

        p2.appendChild(ojo);
    }
}

/* TERMINAL TEXTO */
function escribir(){
    let texto=[
        "Conectando...",
        "Acceso permitido...",
        "Extrayendo datos...",
        "ERROR...",
        "No debiste entrar..."
    ];

    let t=document.getElementById("terminal");
    let i=0;

    function linea(){
        if(i<texto.length){
            let div=document.createElement("div");
            t.appendChild(div);

            let j=0;

            let inter=setInterval(()=>{
                div.textContent+=texto[i][j];
                j++;

                if(j>=texto[i].length){
                    clearInterval(inter);
                    i++;
                    setTimeout(linea,400);
                }
            },40);
        }else{
            terrorFinal();
        }
    }

    linea();
}

/* TEXTOS ROJOS */
function terrorFinal(){
    let frases=[
        "Te estoy viendo",
        "No puedes escapar",
        "Es muy tarde",
        "Sigo aquí",
        "Mira atrás"
    ];

    let count=0;

    let intervalo=setInterval(()=>{

        let t=document.createElement("div");
        t.className="terror";
        t.textContent=frases[Math.floor(Math.random()*frases.length)];

        t.style.left=Math.random()*window.innerWidth+"px";
        t.style.top=Math.random()*window.innerHeight+"px";

        document.body.appendChild(t);

        count++;

        if(count>=20){
            clearInterval(intervalo);

            document.body.style.background="red";

            setTimeout(()=>{
                window.close();
            },2000);
        }

    },500);
}

</script>

</body>
</html>
