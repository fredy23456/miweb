<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>NO DEBISTE ENTRAR</title>
<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

#container{
    max-width:600px;
    position:relative;
    z-index:2;
}

h1{
    font-size:32px;
    margin-bottom:20px;
    text-shadow:0 0 10px white;
}

button{
    padding:10px 20px;
    margin:10px;
    font-size:18px;
    background:black;
    color:white;
    border:2px solid white;
    cursor:pointer;
}

button:hover{
    background:white;
    color:black;
}

/* Parpadeo */
.flash{
    animation:flash 0.1s infinite;
}

@keyframes flash{
    0%{background:black;color:white;}
    50%{background:white;color:black;}
    100%{background:black;color:white;}
}

/* Apariciones de cara */
.face{
    position:fixed;
    width:150px;
    opacity:0.2;
    pointer-events:none;
    z-index:1;
    display:none;
}
</style>
</head>
<body>

<img src="cara.png" class="face" id="f1" style="top:10%;left:5%;">
<img src="cara.png" class="face" id="f2" style="bottom:10%;right:5%;">
<img src="cara.png" class="face" id="f3" style="top:50%;left:80%;">

<div id="container">
    <h1 id="question">¿Quieres jugar?</h1>
    <button onclick="answer(true)">Sí</button>
    <button onclick="answer(false)">No</button>
</div>

<!-- Música -->
<audio id="bgMusic" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<!-- Sonido puerta -->
<audio id="doorSound">
    <source src="puerta.mp3" type="audio/mpeg">
</audio>

<script>
let step = 0;
let musicStarted = false;

function startMusic(){
    const music = document.getElementById("bgMusic");
    if(!musicStarted){
        music.volume = 0.4;
        music.play();
        musicStarted = true;
    }
}

function showFaces(){
    document.querySelectorAll('.face').forEach(f=>{
        f.style.display = 'block';
        setTimeout(()=>{f.style.display='none';}, 800);
    });
}

function playDoor(){
    const music = document.getElementById("bgMusic");
    const door = document.getElementById("doorSound");

    music.pause();
    door.volume = 1;
    door.play();

    door.onended = () => {
        music.play();
    };
}

function answer(choice){
    startMusic();

    const q = document.getElementById("question");
    step++;

    if(step === 1){
        q.innerText = choice ? "Sabía que dirías que sí..." : "No puedes escapar...";
    }
    else if(step === 2){
        q.innerText = "¿Estás solo?";
    }
    else if(step === 3){
        q.innerText = "Escucha...";
        showFaces();
    }
    else if(step === 4){
        q.innerText = "...toc toc...";
        playDoor();
    }
    else if(step === 5){
        q.innerText = "Estoy afuera de tu casa";
    }
    else if(step === 6){
        document.body.classList.add("flash");
        q.innerText = "No debiste entrar";
    }
}
</script>

</body>
</html>
