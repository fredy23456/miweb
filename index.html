<!DOCTYPE html>
<html>
<head>
<title>Comunidad Tighti</title>

<style>
body{
    margin:0;
    background: url("tighti.png") no-repeat center center fixed;
    background-size: cover;
    color:white;
    font-family:Arial;
    text-align:center;
    overflow:hidden;
}

/* FONDO PRO */
body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(0,0,0,0.6) 100%);
    pointer-events:none;
    z-index:-1;
}

/* TITULO */
.neon{
    font-size:40px;
    text-shadow:0 0 10px #ff00ff, 0 0 25px #00ffff;
}

/* BOTON PLAY */
.play-btn{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    padding:25px 60px;
    font-size:30px;
    color:white;
    background:linear-gradient(45deg,#ff00ff,#00ffff);
    border:none;
    border-radius:20px;
    cursor:pointer;
    box-shadow:0 0 20px #ff00ff,0 0 40px #00ffff;
}

/* MENU JUEGOS */
.menu-juegos{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    background:rgba(0,0,0,0.9);
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 30px #ff00ff,0 0 60px #00ffff;
    transition:0.3s;
    z-index:10;
}

.menu-juegos.show{
    transform:translate(-50%,-50%) scale(1);
}

.menu-juegos button{
    margin:10px;
    padding:15px 25px;
    font-size:18px;
    background:linear-gradient(45deg,#ff00ff,#00ffff);
    border:none;
    border-radius:15px;
    color:white;
    cursor:pointer;
}

/* FONDO OSCURO */
.fondo{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    display:none;
    z-index:5;
}

/* LINKS */
.container{
    position:fixed;
    left:40px;
    top:50%;
    transform:translateY(-50%);
    display:flex;
    flex-direction:column;
    gap:20px;
}

.card{
    background:rgba(0,0,0,0.7);
    backdrop-filter:blur(5px);
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 15px #ff00ff,0 0 25px #00ffff;
    width:150px;
}

/* MUSICA */
.musica{
    position:fixed;
    bottom:15px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.6);
    padding:8px 15px;
    border-radius:30px;
    box-shadow:0 0 10px #00ffff;
    display:flex;
    align-items:center;
    gap:10px;
}

.music-btn{
    background:linear-gradient(45deg,#ff00ff,#00ffff);
    border:none;
    color:white;
    font-size:16px;
    padding:6px 10px;
    border-radius:50%;
    cursor:pointer;
}

/* REGLAS */
.reglas{
    position:fixed;
    right:20px;
    top:20px;
}

.reglas button{
    background:black;
    color:white;
    border:none;
    padding:10px;
    box-shadow:0 0 10px #00ffff;
    cursor:pointer;
}

.lista{
    display:none;
    background:rgba(0,0,0,0.7);
    backdrop-filter:blur(5px);
    padding:15px;
    margin-top:10px;
    border-radius:10px;
    box-shadow:0 0 10px #ff00ff,0 0 20px #00ffff;
}
</style>
</head>

<body>

<h1 class="neon">Bienvenido a la comunidad de Tighti</h1>

<div id="fondo" class="fondo"></div>

<button class="play-btn" onclick="mostrarMenu()">▶ PLAY</button>

<!-- MENU -->
<div id="menuJuegos" class="menu-juegos">
    <h2>🎮 ELIGE TU JUEGO</h2>

    <button onclick="abrirJuego('bird.html')">🐤 TIGHTY BIRD</button>
    <button onclick="abrirJuego('juego.html')">☠ TIGHTY APOCALIPSIS</button>
    <button onclick="abrirJuego('citas.html')">💖 TIGHTY DATING</button>

    <!-- 🤖 IA REAL -->
    <button onclick="abrirLink()">🤖 IA DE TIGHTY</button>

    <br><br>
    <button onclick="cerrarMenu()">❌ Cerrar</button>
</div>

<!-- LINKS -->
<div class="container">
    <div class="card">
        <h2>Discord</h2>
        <a href="https://discord.gg/cruqhYg5">Unirse</a>
    </div>

    <div class="card">
        <h2>Twitch</h2>
        <a href="https://www.twitch.tv/tighty1">Ver canal</a>
    </div>

    <div class="card">
        <h2>TikTok</h2>
        <a href="https://www.tiktok.com/@tighty11">Ver perfil</a>
    </div>

    <div class="card">
        <h2>X</h2>
        <a href="https://x.com/Tighty_1">Ver perfil</a>
    </div>
</div>

<!-- MUSICA -->
<div class="musica">
    <button class="music-btn" onclick="toggleMusic()" id="btnMusic">▶</button>
    <input type="range" min="0" max="1" step="0.05" value="0.5" oninput="volumen(this.value)">
</div>

<audio id="bgMusic" loop autoplay>
    <source src="tighty_cansion.mp3">
</audio>

<!-- REGLAS -->
<div class="reglas">
    <button onclick="toggleReglas()">☰ Reglas</button>
    <div class="lista" id="lista">
        <p>✔ No spam</p>
        <p>✔ Respeto a todos</p>
        <p>✔ No insultos</p>
        <p>✔ No contenido +18</p>
        <p>✔ No links sospechosos</p>
        <p>✔ Sigue a los admins</p>
        <p>✔ Diviértete 😎</p>
    </div>
</div>

<script>
let music=document.getElementById("bgMusic");
let btn=document.getElementById("btnMusic");

music.volume=0.5;

function toggleMusic(){
    if(music.paused){
        music.play();
        btn.textContent="⏸";
    }else{
        music.pause();
        btn.textContent="▶";
    }
}

function volumen(v){
    music.volume=v;
}

function toggleReglas(){
    let l=document.getElementById("lista");
    l.style.display=(l.style.display=="block")?"none":"block";
}

/* MENU */
function mostrarMenu(){
    document.getElementById("menuJuegos").classList.add("show");
    document.getElementById("fondo").style.display="block";
}

function cerrarMenu(){
    document.getElementById("menuJuegos").classList.remove("show");
    document.getElementById("fondo").style.display="none";
}

function abrirJuego(juego){
    window.open(juego,"_blank");
}

/* 🤖 ABRIR IA */
function abrirLink(){
    window.open("https://character.ai/chat/YJgEq97YO3epOVbEro1kg-Xr4PW5hVA8HKVfX9Fvius");
}
</script>

</body>
</html>
