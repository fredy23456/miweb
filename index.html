<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>¿Te atreves?</title>
<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

#container{
    max-width:600px;
}

h1{
    font-size:30px;
    margin-bottom:20px;
}

button{
    padding:10px 20px;
    margin:10px;
    font-size:18px;
    background:black;
    color:white;
    border:2px solid white;
    cursor:pointer;
}

button:hover{
    background:white;
    color:black;
}

.flash{
    animation:flash 0.2s infinite;
}

@keyframes flash{
    0%{background:black;color:white;}
    50%{background:white;color:black;}
    100%{background:black;color:white;}
}
</style>
</head>
<body>

<div id="container">
    <h1 id="question">¿Quieres jugar?</h1>
    <button onclick="answer(true)">Sí</button>
    <button onclick="answer(false)">No</button>
</div>

<!-- Música de terror -->
<audio id="bgMusic" loop>
    <source src="https://www.myinstants.com/media/sounds/creepy-ambience.mp3" type="audio/mpeg">
</audio>

<script>
let step = 0;
let musicStarted = false;

function startMusic(){
    const music = document.getElementById("bgMusic");
    if(!musicStarted){
        music.play();
        musicStarted = true;
    }
}

function answer(choice){
    startMusic(); // inicia música al primer clic

    const q = document.getElementById("question");
    step++;

    if(step === 1){
        q.innerText = choice ? "Sabía que dirías que sí..." : "No puedes escapar...";
    }
    else if(step === 2){
        q.innerText = "¿Estás solo?";
    }
    else if(step === 3){
        q.innerText = choice ? "Eso crees..." : "Entonces mira detrás de ti...";
    }
    else if(step === 4){
        q.innerText = "¿Escuchaste eso?";
    }
    else if(step === 5){
        q.innerText = "Está más cerca de lo que piensas...";
    }
    else if(step === 6){
        q.innerText = "Última pregunta...";
    }
    else if(step === 7){
        q.innerText = "¿Quieres que te encuentre?";
    }
    else if(step === 8){
        document.body.classList.add("flash");
        q.innerText = choice ? "Ya voy por ti..." : "Demasiado tarde...";

        setTimeout(()=>{
            q.innerText = "...";
        },2000);
    }
}
</script>

</body>
</html>
