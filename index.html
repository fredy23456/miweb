<!DOCTYPE html>
<html>
<head>
<title>Comunidad Tighti</title>

<style>
body{
    margin:0;
    background:linear-gradient(to right, black, #1a001a);
    color:white;
    font-family:Arial;
    text-align:center;
    overflow:hidden;
}

h1{
    margin-top:40px;
    text-shadow:0 0 10px #ff00ff,0 0 20px #00ffff;
}

.container{
    display:flex;
    justify-content:center;
    gap:40px;
    margin-top:60px;
}

.card{
    background:#0a0a0a;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 20px #ff00ff,0 0 40px #00ffff;
}

button, a{
    padding:12px 25px;
    border-radius:20px;
    border:none;
    background:linear-gradient(45deg,#ff00ff,#00ffff);
    color:white;
    cursor:pointer;
    margin-top:20px;
    text-decoration:none;
}

.fade{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    top:0;
    left:0;
    opacity:0;
    transition:opacity 2s;
    z-index:5;
    pointer-events:none;
}

.screen{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    top:0;
    left:0;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:10;
}

.ojo{
    position:absolute;
    width:60px;
    opacity:0.5;
}

.terminal{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    color:#00ff00;
    font-family:monospace;
    padding:20px;
    text-align:left;
    display:none;
    z-index:20;
}
</style>
</head>
<body>

<h1>Bienvenido a la comunidad de Tighti</h1>

<div class="container">
    <div class="card">
        <h2>Discord</h2>
        <a href="https://discord.gg/cruqhYg5">Unirse</a>
    </div>

    <div class="card">
        <h2>Twitch</h2>
        <a href="https://www.twitch.tv/tighty1">Ver canal</a>
    </div>
</div>

<button onclick="pantalla1()">Conocer más</button>

<div class="fade" id="fade"></div>

<!-- Pantalla 1 -->
<div class="screen" id="s1">
    <h1>¿Quieres conocer más?</h1>
    <button onclick="pantalla2()">Sí</button>
    <button id="no1">No</button>
    <audio id="musica" loop>
        <source src="musica.mp3">
    </audio>
</div>

<!-- Pantalla 2 -->
<div class="screen" id="s2">
    <h1>¿Estás seguro?</h1>
    <button onclick="terminal()">Estoy seguro</button>
    <button id="no2">No</button>
</div>

<!-- Terminal -->
<div class="terminal" id="terminal"></div>

<script>
let fade=document.getElementById("fade");

/* Oscurecer */
function oscurecer(callback){
    fade.style.opacity="1";
    setTimeout(()=>{
        callback();
        setTimeout(()=>{
            fade.style.opacity="0";
        },300);
    },2000);
}

/* Pantallas */
function pantalla1(){
    oscurecer(()=>{
        document.getElementById("s1").style.display="flex";
        document.getElementById("musica").play();
    });
}

function pantalla2(){
    oscurecer(()=>{
        document.getElementById("s1").style.display="none";
        document.getElementById("s2").style.display="flex";
        crearOjos();
    });
}

function terminal(){
    oscurecer(()=>{
        document.getElementById("s2").style.display="none";
        document.getElementById("terminal").style.display="block";
        escribirTerminal();
    });
}

/* Botón NO se mueve */
function mover(btn){
    btn.style.position="absolute";
    btn.style.left=Math.random()*window.innerWidth+"px";
    btn.style.top=Math.random()*window.innerHeight+"px";
}

document.addEventListener("mouseover",function(e){
    if(e.target.id=="no1" || e.target.id=="no2"){
        mover(e.target);
    }
});

/* Ojos */
function crearOjos(){
    let s2=document.getElementById("s2");
    for(let i=0;i<25;i++){
        let ojo=document.createElement("img");
        ojo.src="ojo.png";
        ojo.className="ojo";
        ojo.style.left=Math.random()*window.innerWidth+"px";
        ojo.style.top=Math.random()*window.innerHeight+"px";
        s2.appendChild(ojo);
    }
}

/* Terminal */
function escribirTerminal(){
    let lineas=[
        "Conectando...",
        "Accediendo al sistema...",
        "Usuario detectado...",
        "Descargando archivos...",
        "Instalando virus...",
        "ERROR...",
        "No debiste entrar aqui..."
    ];

    let term=document.getElementById("terminal");
    let i=0;

    function escribirLinea(){
        if(i>=lineas.length){
            textosRojos();
            return;
        }

        let div=document.createElement("div");
        term.appendChild(div);

        let j=0;
        let inter=setInterval(()=>{
            div.textContent+=lineas[i][j];
            j++;

            if(j>=lineas[i].length){
                clearInterval(inter);
                i++;
                setTimeout(escribirLinea,500);
            }
        },40);
    }

    escribirLinea();
}

/* Textos rojos */
function textosRojos(){
    let mensajes=[
        "Te estamos observando",
        "No puedes salir",
        "Ya es tarde",
        "Nunca debiste entrar",
        "Sabemos quien eres",
        "Tu camara esta activa"
    ];

    setInterval(()=>{
        let t=document.createElement("div");
        t.style.position="absolute";
        t.style.color="red";
        t.style.fontSize="22px";
        t.textContent=mensajes[Math.floor(Math.random()*mensajes.length)];
        t.style.left=Math.random()*window.innerWidth+"px";
        t.style.top=Math.random()*window.innerHeight+"px";
        document.body.appendChild(t);
    },700);
}
</script>

</body>
</html>
