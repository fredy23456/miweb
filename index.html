<!DOCTYPE html>
<html>
<head>
<title>Comunidad Tighti</title>

<style>
body{
    margin:0;
    background: url("tighti.png") no-repeat center center fixed;
    background-size: cover;
    color:white;
    font-family:Arial;
    text-align:center;
    overflow:hidden;
}

/* FONDO MEJORADO (SIN CUADRO FEO) */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.6));
    z-index:-1;
}

/* 🟠 TITULO */
.neon{
    font-size:40px;
    animation: glow 2s infinite alternate;
}
@keyframes glow{
    from{ text-shadow:0 0 10px #ff00ff;}
    to{ text-shadow:0 0 25px #00ffff;}
}

/* 🔴 LINKS IZQUIERDA */
.container{
    position:fixed;
    left:40px;
    top:50%;
    transform:translateY(-50%);
    display:flex;
    flex-direction:column;
    gap:20px;
}

.card{
    background:#0a0a0a;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 15px #ff00ff,0 0 25px #00ffff;
    width:150px;
}

/* 🟢 MUSICA */
.musica{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:black;
    padding:15px;
    border-radius:20px;
    box-shadow:0 0 20px #00ffff;
}

/* BOTON MUSICA PRO */
.music-btn{
    background:linear-gradient(45deg,#ff00ff,#00ffff);
    border:none;
    color:white;
    font-size:18px;
    padding:10px 15px;
    border-radius:50%;
    cursor:pointer;
    box-shadow:0 0 15px #00ffff;
    transition:0.3s;
}
.music-btn:hover{
    transform:scale(1.1);
}

/* 🔵 REGLAS */
.reglas{
    position:fixed;
    right:20px;
    top:20px;
}

.reglas button{
    background:black;
    color:white;
    border:none;
    padding:10px;
    box-shadow:0 0 10px #00ffff;
    cursor:pointer;
}

.lista{
    display:none;
    background:#0a0a0a;
    padding:15px;
    margin-top:10px;
    border-radius:10px;
    box-shadow:0 0 10px #ff00ff,0 0 20px #00ffff;
}

/* BOTON */
.btn-neon{
    padding:12px 25px;
    border-radius:20px;
    border:none;
    background:linear-gradient(45deg,#ff00ff,#00ffff);
    color:white;
    cursor:pointer;
    margin-top:20px;
}
</style>
</head>

<body>

<h1 class="neon">Bienvenido a la comunidad de Tighti</h1>

<!-- 🔴 LINKS -->
<div class="container">
    <div class="card">
        <h2>Discord</h2>
        <a href="https://discord.gg/cruqhYg5">Unirse</a>
    </div>

    <div class="card">
        <h2>Twitch</h2>
        <a href="https://www.twitch.tv/tighty1">Ver canal</a>
    </div>
</div>

<!-- 🟢 MUSICA -->
<div class="musica">
    <button class="music-btn" onclick="toggleMusic()" id="btnMusic">▶</button>
    <input type="range" min="0" max="1" step="0.05" value="0.5" oninput="volumen(this.value)">
</div>

<audio id="bgMusic" loop autoplay>
    <source src="tighty_cansion.mp3">
</audio>

<!-- 🔵 REGLAS -->
<div class="reglas">
    <button onclick="toggleReglas()">☰ Reglas</button>
    <div class="lista" id="lista">
        <p>✔ No spam</p>
        <p>✔ Respeto a todos</p>
        <p>✔ No contenido ofensivo</p>
    </div>
</div>

<button class="btn-neon">Conocer más</button>

<script>
let music=document.getElementById("bgMusic");
let btn=document.getElementById("btnMusic");

/* volumen inicial */
music.volume=0.5;

function toggleMusic(){
    if(music.paused){
        music.play();
        btn.textContent="⏸";
    }else{
        music.pause();
        btn.textContent="▶";
    }
}

function volumen(v){
    music.volume=v;
}

function toggleReglas(){
    let l=document.getElementById("lista");
    l.style.display=(l.style.display=="block")?"none":"block";
}
</script>

</body>
</html>
