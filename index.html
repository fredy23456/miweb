<script>
let fade = document.getElementById("fade");

/* OSCURECER SIEMPRE */
function oscurecer(callback){
    fade.style.transition = "opacity 2s";
    fade.style.opacity = "1";

    setTimeout(()=>{
        fade.style.opacity = "0";
        if(callback) callback();
    },2000);
}

function mostrar(){
    oscurecer(()=>{
        document.getElementById("pantalla1").style.display="flex";
        document.getElementById("musica").play();
    });
}

function pantallaSeguro(){
    oscurecer(()=>{
        document.getElementById("pantalla1").style.display="none";
        document.getElementById("pantalla2").style.display="flex";
        crearOjos();
    });
}

function terminal(){
    oscurecer(()=>{
        document.getElementById("pantalla2").style.display="none";
        document.getElementById("terminal").style.display="block";
        escribirTerminal();
    });
}

/* BOTON NO SE MUEVE */
function moverNo(btn){
    btn.style.position="absolute";
    btn.style.left=Math.random()*(window.innerWidth-100)+"px";
    btn.style.top=Math.random()*(window.innerHeight-50)+"px";
}

document.addEventListener("mouseover",function(e){
    if(e.target.id==="noBtn" || e.target.id==="noBtn2"){
        moverNo(e.target);
    }
});

/* OJOS */
function crearOjos(){
    let pantalla=document.getElementById("pantalla2");
    for(let i=0;i<25;i++){
        let ojo=document.createElement("img");
        ojo.src="ojo.png";
        ojo.className="ojo";
        ojo.style.left=Math.random()*window.innerWidth+"px";
        ojo.style.top=Math.random()*window.innerHeight+"px";
        pantalla.appendChild(ojo);
    }
}

/* TERMINAL TEXTO */
function escribirTerminal(){
    let texto=[
        "Conectando...",
        "Accediendo al sistema...",
        "Usuario detectado...",
        "Descargando archivos...",
        "Instalando...",
        "ERROR...",
        "No debiste entrar aqui..."
    ];

    let terminal=document.getElementById("terminal");
    terminal.innerHTML="";
    let i=0;

    function escribirLinea(){
        if(i<texto.length){
            let linea=document.createElement("div");
            terminal.appendChild(linea);

            let j=0;
            let intervalo=setInterval(()=>{
                linea.textContent+=texto[i][j];
                j++;
                if(j>=texto[i].length){
                    clearInterval(intervalo);
                    i++;
                    setTimeout(escribirLinea,400);
                }
            },30);
        }else{
            /* CUANDO TERMINA EMPIEZAN MENSAJES ROJOS */
            setTimeout(()=>{
                mensajesTerror();
            },1000);
        }
    }

    escribirLinea();
}

/* MENSAJES ROJOS */
function mensajesTerror(){
    let mensajes=[
        "Te estamos observando",
        "No puedes salir",
        "Ya es tarde",
        "Nunca debiste entrar",
        "Ahora sabemos quien eres",
        "Tu camara esta activa",
        "No cierres la pagina"
    ];

    setInterval(()=>{
        let m=document.createElement("div");
        m.className="terror";
        m.textContent=mensajes[Math.floor(Math.random()*mensajes.length)];

        m.style.left=Math.random()*window.innerWidth+"px";
        m.style.top=Math.random()*window.innerHeight+"px";

        document.body.appendChild(m);
    },1500);
}
</script>
