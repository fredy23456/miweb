<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>NO DEBISTE ENTRAR</title>
<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    cursor:none;
}

#container{
    max-width:600px;
    position:relative;
    z-index:2;
}

h1{
    font-size:32px;
    margin-bottom:20px;
    text-shadow:0 0 10px white;
}

button{
    padding:10px 20px;
    margin:10px;
    font-size:18px;
    background:black;
    color:white;
    border:2px solid white;
    cursor:pointer;
}

button:hover{
    background:white;
    color:black;
}

/* Parpadeo */
.flash{
    animation:flash 0.1s infinite;
}

@keyframes flash{
    0%{background:black;color:white;}
    50%{background:white;color:black;}
    100%{background:black;color:white;}
}

/* Imagen jumpscare */
#jumpscare{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:url('cara.png') center/cover no-repeat;
    display:none;
    z-index:999;
}

/* Ojo que sigue */
#eye{
    position:fixed;
    width:80px;
    height:80px;
    background:url('ojo.png') center/contain no-repeat;
    pointer-events:none;
    z-index:3;
}

/* Fondo oscuro animado */
.dark{
    animation:darkmove 2s infinite alternate;
}

@keyframes darkmove{
    from{filter:brightness(1);} 
    to{filter:brightness(0.3);} 
}
</style>
</head>
<body class="dark">

<div id="jumpscare"></div>
<div id="eye"></div>

<div id="container">
    <h1 id="question">¿Quieres jugar?</h1>
    <button onclick="answer(true)">Sí</button>
    <button onclick="answer(false)">No</button>
</div>

<audio id="bgMusic" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<audio id="scream">
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
let step = 0;
let musicStarted = false;

function startMusic(){
    const music = document.getElementById("bgMusic");
    if(!musicStarted){
        music.volume = 0.4;
        music.play();
        musicStarted = true;
    }
}

function jumpscare(){
    const j = document.getElementById("jumpscare");
    const scream = document.getElementById("scream");

    j.style.display = "block";
    scream.volume = 1;
    scream.play();

    setTimeout(()=>{
        j.style.display = "none";
    },1000);
}

function answer(choice){
    startMusic();

    const q = document.getElementById("question");
    step++;

    if(step === 1){
        q.innerText = choice ? "Sabía que dirías que sí..." : "No puedes escapar...";
    }
    else if(step === 2){
        q.innerText = "¿Estás solo?";
    }
    else if(step === 3){
        q.innerText = choice ? "Eso crees..." : "Mira detrás de ti...";
        jumpscare();
    }
    else if(step === 4){
        q.innerText = "¿Escuchaste eso?";
    }
    else if(step === 5){
        q.innerText = "Está aquí contigo...";
    }
    else if(step === 6){
        document.body.classList.add("flash");
        q.innerText = "No debiste entrar";
        jumpscare();
    }
}

/* Ojo sigue al mouse */
document.addEventListener("mousemove", (e)=>{
    const eye = document.getElementById("eye");
    eye.style.left = e.clientX + "px";
    eye.style.top = e.clientY + "px";
});
</script>

</body>
</html>
