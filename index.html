<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Comunidad Tighti</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
    text-align:center;
    transition:1s;
}

#segunda{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

button{
    padding:15px 30px;
    margin:10px;
    font-size:20px;
    background:#111;
    color:white;
    border:2px solid white;
    cursor:pointer;
}

img{
    position:fixed;
    bottom:10px;
    right:10px;
    width:150px;
}
</style>
</head>

<body>

<div id="primera">
    <h1>Bienvenido a la comunidad de Tighti</h1>

    <br><br>

    <a href="https://discord.gg/cruqhYg5">
        <button>Discord</button>
    </a>

    <a href="https://www.twitch.tv/tighty1">
        <button>Twitch</button>
    </a>

    <br><br>

    <button onclick="conocerMas()">Conocer más</button>
</div>


<div id="segunda">
    <h1>¿Estas seguro que quieres conocer más?</h1>

    <div>
        <button onclick="alert('Sabia que dirias que si 😈')">SI</button>
        <button onclick="alert('Tal vez luego...')">NO</button>
    </div>
</div>


<audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<img src="cara.png">


<script>
function conocerMas(){
    var audio = document.getElementById("musica");
    audio.play();

    document.body.style.opacity = "0";

    setTimeout(function(){
        document.getElementById("primera").style.display="none";
        document.getElementById("segunda").style.display="flex";
        document.body.style.opacity = "1";
    },1000);
}
</script>

</body>
</html>
