<!DOCTYPE html>
<html>
<head>
<title>Comunidad Tighti</title>

<style>
body{
    margin:0;
    background: url("tighti.png") no-repeat center center fixed;
    background-size: cover;
    color:white;
    font-family:Arial;
    text-align:center;
    overflow:hidden;
}

/* OSCURECER */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    z-index:-1;
}

/* 🟠 TITULO ANIMADO */
.neon{
    font-size:40px;
    animation: glow 2s infinite alternate;
}
@keyframes glow{
    from{ text-shadow:0 0 10px #ff00ff;}
    to{ text-shadow:0 0 20px #00ffff;}
}

/* 🔴 REDES IZQUIERDA */
.redes{
    position:fixed;
    left:20px;
    top:50%;
    transform:translateY(-50%);
    display:flex;
    flex-direction:column;
    gap:20px;
}

.redes a{
    background:black;
    padding:15px;
    border-radius:10px;
    color:white;
    text-decoration:none;
    box-shadow:0 0 10px #ff00ff;
}

/* 🟢 MUSICA */
.musica{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:black;
    padding:15px;
    border-radius:20px;
    box-shadow:0 0 15px #00ffff;
    animation: flotar 3s infinite;
}
@keyframes flotar{
    0%{transform:translateX(-50%) translateY(0);}
    50%{transform:translateX(-50%) translateY(-5px);}
    100%{transform:translateX(-50%) translateY(0);}
}

/* 🔵 REGLAS */
.reglas{
    position:fixed;
    right:20px;
    top:20px;
}

.reglas button{
    padding:10px;
}

.lista{
    display:none;
    background:black;
    padding:15px;
    margin-top:10px;
}

/* BOTON */
.btn-neon{
    padding:12px 25px;
    border-radius:20px;
    border:none;
    background:linear-gradient(45deg,#ff00ff,#00ffff);
    color:white;
    cursor:pointer;
    margin-top:20px;
}
</style>
</head>

<body>

<h1 class="neon">Bienvenido a la comunidad de Tighti</h1>

<!-- 🔴 REDES -->
<div class="redes">
    <a href="https://discord.gg/cruqhYg5">Discord</a>
    <a href="https://www.twitch.tv/tighty1">Twitch</a>
</div>

<!-- 🟢 MUSICA -->
<div class="musica">
    <button onclick="toggleMusic()">⏯️</button>
    <input type="range" min="0" max="1" step="0.1" onchange="volumen(this.value)">
</div>

<audio id="bgMusic" loop>
    <source src="tighty_cansion.mp3">
</audio>

<!-- 🔵 REGLAS -->
<div class="reglas">
    <button onclick="toggleReglas()">☰ Reglas</button>
    <div class="lista" id="lista">
        <p>No spam</p>
        <p>Respeto a todos</p>
        <p>No contenido ofensivo</p>
    </div>
</div>

<button class="btn-neon">Conocer más</button>

<script>
let music=document.getElementById("bgMusic");

function toggleMusic(){
    if(music.paused){
        music.play();
    }else{
        music.pause();
    }
}

function volumen(v){
    music.volume=v;
}

function toggleReglas(){
    let l=document.getElementById("lista");
    l.style.display=(l.style.display=="block")?"none":"block";
}
</script>

</body>
</html>
