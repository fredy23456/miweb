<!DOCTYPE html>
<html>
<head>
<title>Tighty Game</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    text-align:center;
    font-family:Arial;
    overflow:hidden;
}

/* BOTON PLAY */
.play-btn{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:40px;
    padding:20px 60px;
    border:none;
    border-radius:20px;
    background:linear-gradient(45deg,#ff00ff,#00ffff);
    color:white;
    cursor:pointer;
    box-shadow:0 0 30px #ff00ff,0 0 50px #00ffff;
}

/* CANVAS */
canvas{
    display:none;
    background:#111;
}
</style>
</head>

<body>

<button class="play-btn" onclick="startGame()">PLAY</button>

<canvas id="game" width="400" height="600"></canvas>

<script>
let canvas=document.getElementById("game");
let ctx=canvas.getContext("2d");

let playerImg=new Image();
playerImg.src="tighty_game.png";

let y=300;
let velocity=0;
let gravity=0.5;
let jump=-8;

let pipes=[];
let score=0;
let lives=3;
let gameRunning=false;

function startGame(){
    document.querySelector(".play-btn").style.display="none";
    canvas.style.display="block";
    gameRunning=true;
    loop();
}

document.addEventListener("keydown",()=>{
    velocity=jump;
});

function createPipe(){
    let gap=150;
    let top=Math.random()*300;

    pipes.push({
        x:400,
        top:top,
        bottom:top+gap
    });
}

function loop(){
    if(!gameRunning) return;

    ctx.clearRect(0,0,400,600);

    // jugador
    velocity+=gravity;
    y+=velocity;

    ctx.drawImage(playerImg,50,y,50,50);

    // tubos
    for(let i=0;i<pipes.length;i++){
        let p=pipes[i];
        p.x-=3;

        ctx.fillStyle="cyan";
        ctx.fillRect(p.x,0,50,p.top);
        ctx.fillRect(p.x,p.bottom,50,600);

        // colision
        if(50+50>p.x && 50<p.x+50){
            if(y<p.top || y+50>p.bottom){
                loseLife();
            }
        }

        if(p.x<0){
            pipes.splice(i,1);
            score++;
        }
    }

    // crear tubos
    if(Math.random()<0.02){
        createPipe();
    }

    // suelo
    if(y>550){
        loseLife();
    }

    // HUD
    ctx.fillStyle="white";
    ctx.font="20px Arial";
    ctx.fillText("Score: "+score,10,20);
    ctx.fillText("Vidas: "+lives,10,50);

    requestAnimationFrame(loop);
}

function loseLife(){
    lives--;
    y=300;
    velocity=0;

    if(lives<=0){
        alert("Game Over 😈 Score: "+score);
        location.reload();
    }
}
</script>

</body>
</html>
