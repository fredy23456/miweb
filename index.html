<!DOCTYPE html>
<html>
<head>
<title>Comunidad Tighti</title>

<style>
body{
    margin:0;
    background: url("tighti.png") no-repeat center center fixed;
    background-size: cover;
    color:white;
    font-family:Arial;
    text-align:center;
    overflow:hidden;
}

/* FONDO OSCURO AL ABRIR MENU */
.overlay-bg{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    display:none;
    z-index:5;
}

/* TITULO */
.neon{
    font-size:40px;
    text-shadow:0 0 10px #ff00ff, 0 0 25px #00ffff;
}

/* BOTON PLAY */
.play-btn{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    padding:25px 60px;
    font-size:30px;
    color:white;
    background:linear-gradient(45deg,#ff00ff,#00ffff);
    border:none;
    border-radius:20px;
    cursor:pointer;
    box-shadow:0 0 20px #ff00ff,0 0 40px #00ffff;
    transition:0.3s;
    z-index:2;
}

.play-btn:hover{
    transform:translate(-50%,-50%) scale(1.1);
}

/* MENU JUEGOS */
.menu-juegos{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    background:rgba(0,0,0,0.95);
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 30px #ff00ff,0 0 60px #00ffff;
    transition:0.3s;
    z-index:10;
}

.menu-juegos.show{
    transform:translate(-50%,-50%) scale(1);
}

.menu-juegos h2{
    margin-bottom:20px;
    text-shadow:0 0 10px #00ffff;
}

.menu-juegos button{
    display:block;
    margin:15px auto;
    padding:15px 30px;
    font-size:18px;
    color:white;
    background:linear-gradient(45deg,#ff00ff,#00ffff);
    border:none;
    border-radius:15px;
    cursor:pointer;
    box-shadow:0 0 15px #ff00ff,0 0 25px #00ffff;
    transition:0.2s;
}

.menu-juegos button:hover{
    transform:scale(1.1);
}

/* BOTON CERRAR */
.cerrar{
    margin-top:20px;
    background:#111;
    box-shadow:0 0 10px red;
}

/* LINKS */
.container{
    position:fixed;
    left:40px;
    top:50%;
    transform:translateY(-50%);
    display:flex;
    flex-direction:column;
    gap:20px;
}

.card{
    background:rgba(0,0,0,0.7);
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 15px #ff00ff,0 0 25px #00ffff;
    width:150px;
}

/* MUSICA */
.musica{
    position:fixed;
    bottom:15px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.6);
    padding:8px 15px;
    border-radius:30px;
    box-shadow:0 0 10px #00ffff;
    display:flex;
    align-items:center;
    gap:10px;
}

.music-btn{
    background:linear-gradient(45deg,#ff00ff,#00ffff);
    border:none;
    color:white;
    font-size:16px;
    padding:6px 10px;
    border-radius:50%;
    cursor:pointer;
}

/* REGLAS */
.reglas{
    position:fixed;
    right:20px;
    top:20px;
}

.reglas button{
    background:black;
    color:white;
    border:none;
    padding:10px;
    box-shadow:0 0 10px #00ffff;
    cursor:pointer;
}

.lista{
    display:none;
    background:rgba(0,0,0,0.7);
    padding:15px;
    margin-top:10px;
    border-radius:10px;
    box-shadow:0 0 10px #ff00ff,0 0 20px #00ffff;
}
</style>
</head>

<body>

<div class="overlay-bg" id="bg"></div>

<h1 class="neon">Bienvenido a la comunidad de Tighti</h1>

<!-- BOTON PLAY -->
<button class="play-btn" onclick="mostrarMenu()">▶ PLAY</button>

<!-- MENU -->
<div id="menuJuegos" class="menu-juegos">

    <h2>🎮 ELIGE TU JUEGO</h2>

    <button onclick="abrirJuego('bird.html')">🐤 TIGHTY BIRD</button>
    <button onclick="abrirJuego('juego.html')">☠ TIGHTY APOCALYPSE</button>

    <button class="cerrar" onclick="cerrarMenu()">❌ Cerrar</button>

</div>

<!-- LINKS -->
<div class="container">

    <div class="card">
        <h2>Discord</h2>
        <a href="#">Unirse</a>
    </div>

    <div class="card">
        <h2>Twitch</h2>
        <a href="#">Ver canal</a>
    </div>

    <div class="card">
        <h2>TikTok</h2>
        <a href="#">Ver perfil</a>
    </div>

</div>

<!-- MUSICA -->
<div class="musica">
    <button class="music-btn" onclick="toggleMusic()" id="btnMusic">▶</button>
</div>

<audio id="bgMusic" loop autoplay>
    <source src="tighty_cansion.mp3">
</audio>

<script>
let music=document.getElementById("bgMusic");
let btn=document.getElementById("btnMusic");

function toggleMusic(){
    if(music.paused){
        music.play();
        btn.textContent="⏸";
    }else{
        music.pause();
        btn.textContent="▶";
    }
}

/* MENU */
function mostrarMenu(){
    document.getElementById("menuJuegos").classList.add("show");
    document.getElementById("bg").style.display="block";
}

function cerrarMenu(){
    document.getElementById("menuJuegos").classList.remove("show");
    document.getElementById("bg").style.display="none";
}

function abrirJuego(juego){
    window.open(juego, "_blank");
}
</script>

</body>
</html>
