<!DOCTYPE html>
<html>
<head>
    <title>Comunidad Tighti</title>

    <style>
        body {
            margin: 0;
            background: linear-gradient(to right, black, #1a001a);
            color: white;
            font-family: Arial;
            text-align: center;
            overflow: hidden;
        }

        .titulo-neon {
            margin-top: 40px;
            text-shadow:
                0 0 10px #ff00ff,
                0 0 20px #00ffff;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 60px;
            flex-wrap: wrap;
        }

        .card {
            background: #0a0a0a;
            width: 320px;
            padding: 30px;
            border-radius: 20px;
            box-shadow:
                0 0 20px #ff00ff,
                0 0 40px #00ffff;
        }

        a, .btn-neon {
            margin-top: 20px;
            padding: 12px 25px;
            border-radius: 20px;
            color: white;
            border: none;
            cursor: pointer;
            background: linear-gradient(45deg, #ff00ff, #00ffff);
            text-decoration: none;
        }

        .extra {
            margin-top: 40px;
        }

        /* OSCURECER */
        .fade {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            opacity: 0;
            pointer-events: none;
            transition: opacity 8s;
            z-index: 50;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 20;
        }

        .botones {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }

        .simple-btn {
            padding: 12px 25px;
            border-radius: 10px;
            border: none;
            background: white;
            color: black;
            cursor: pointer;
        }

        .imagen {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 150px;
        }

        /* OJOS */
        .ojo {
            position: absolute;
            width: 60px;
            opacity: 0.5;
            pointer-events: none;
        }

    </style>
</head>

<body>

    <h1 class="titulo-neon">Bienvenido a la comunidad de Tighti</h1>

    <div class="container">
        <div class="card">
            <h2>Discord</h2>
            <a href="https://discord.gg/cruqhYg5" target="_blank">Unirse</a>
        </div>

        <div class="card">
            <h2>Twitch</h2>
            <a href="https://www.twitch.tv/tighty1" target="_blank">Ver canal</a>
        </div>
    </div>

    <div class="extra">
        <button class="btn-neon" onclick="mostrar()">Conocer más</button>
    </div>

    <div class="fade" id="fade"></div>

    <!-- PANTALLA 1 -->
    <div class="overlay" id="pantalla">
        <h1>¿Quieres conocer más?</h1>

        <div class="botones">
            <button class="simple-btn" onclick="seguro()">Sí</button>
            <button class="simple-btn" id="noBtn">No</button>
        </div>

        <img src="cara.png" class="imagen">

        <audio id="musica" loop>
            <source src="musica.mp3" type="audio/mpeg">
        </audio>
    </div>

    <!-- PANTALLA 2 -->
    <div class="overlay" id="pantalla2">
        <h1>¿Estás seguro?</h1>

        <div class="botones">
            <button class="simple-btn" onclick="final()">Sí</button>
            <button class="simple-btn" id="noBtn2">No</button>
        </div>
    </div>

    <script>
        function mostrar() {
            let fade = document.getElementById("fade");
            fade.style.opacity = "1";

            setTimeout(() => {
                document.getElementById("pantalla").style.display = "flex";
                let audio = document.getElementById("musica");
                audio.play();
            }, 2000);
        }

        function seguro() {
            document.getElementById("pantalla").style.display = "none";
            document.getElementById("pantalla2").style.display = "flex";
            crearOjos();
        }

        function final() {
            let fade = document.getElementById("fade");
            fade.style.opacity = "1";
        }

        // BOTON NO SE MUEVE
        function moverNo(btn) {
            btn.style.position = "absolute";
            btn.style.left = Math.random() * window.innerWidth + "px";
            btn.style.top = Math.random() * window.innerHeight + "px";
        }

        document.addEventListener("mouseover", function(e) {
            if (e.target.id === "noBtn" || e.target.id === "noBtn2") {
                moverNo(e.target);
            }
        });

        // OJOS EN TODA LA PANTALLA
        function crearOjos() {
            let pantalla = document.getElementById("pantalla2");

            for (let i = 0; i < 40; i++) {
                let ojo = document.createElement("img");
                ojo.src = "ojo.png";
                ojo.className = "ojo";

                let x = Math.random() * window.innerWidth;
                let y = Math.random() * window.innerHeight;

                if (x > window.innerWidth/3 && x < window.innerWidth/1.5 &&
                    y > window.innerHeight/3 && y < window.innerHeight/1.5) {
                    i--;
                    continue;
                }

                ojo.style.left = x + "px";
                ojo.style.top = y + "px";

                pantalla.appendChild(ojo);
            }
        }
    </script>

</body>
</html>
