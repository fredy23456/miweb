<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>El Pequeño Tighy</title>
<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

#container{
    max-width:600px;
    position:relative;
    z-index:2;
}

h1{
    font-size:30px;
    margin-bottom:20px;
}

button{
    padding:10px 20px;
    margin:10px;
    font-size:18px;
    background:black;
    color:white;
    border:2px solid white;
    cursor:pointer;
}

button:hover{
    background:white;
    color:black;
}

.face{
    position:fixed;
    width:120px;
    opacity:0.15;
    pointer-events:none;
    z-index:1;
    display:none;
}

#tighy{
    position:fixed;
    width:80px;
    height:80px;
    background:white;
    border-radius:50%;
    display:none;
    z-index:3;
}
</style>
</head>
<body>

<img src="cara.png" class="face" id="f1" style="top:10%;left:5%;">
<img src="cara.png" class="face" id="f2" style="bottom:10%;right:5%;">
<img src="cara.png" class="face" id="f3" style="top:50%;left:80%;">

<div id="tighy"></div>

<div id="container">
    <h1 id="question">¿Quieres jugar con Tighy?</h1>
    <button onclick="answer(true)">Sí</button>
    <button onclick="answer(false)">No</button>
</div>

<audio id="bgMusic" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<audio id="doorSound">
    <source src="puerta.mp3" type="audio/mpeg">
</audio>

<script>
let step = 0;
let musicStarted = false;
let score = 0;

function startMusic(){
    const music = document.getElementById("bgMusic");
    if(!musicStarted){
        music.volume = 0.4;
        music.play();
        musicStarted = true;
    }
}

function showFaces(){
    document.querySelectorAll('.face').forEach(f=>{
        f.style.display = 'block';
        setTimeout(()=>{f.style.display='none';}, 600);
    });
}

function playDoor(){
    const door = document.getElementById("doorSound");
    door.volume = 1;
    door.play();
}

function spawnTighy(){
    const t = document.getElementById("tighy");
    t.style.display = "block";

    const x = Math.random() * (window.innerWidth - 80);
    const y = Math.random() * (window.innerHeight - 80);

    t.style.left = x + "px";
    t.style.top = y + "px";

    setTimeout(()=>{
        t.style.display = "none";
    }, 1200);
}

// click en Tighy
document.getElementById("tighy").addEventListener("click", ()=>{
    score++;
    document.getElementById("question").innerText = "Tighy atrapado: " + score;
});

function answer(choice){
    startMusic();

    const q = document.getElementById("question");
    step++;

    if(step === 1){
        q.innerText = "Tighy se esconde... encuéntralo";
        setInterval(spawnTighy, 1500);
    }
    else if(step === 2){
        q.innerText = "No le gusta que pierdas...";
        showFaces();
    }
    else if(step === 3){
        q.innerText = "Escucha...";
        playDoor();
    }
    else if(step === 4){
        q.innerText = "Tighy ya no está jugando contigo";
    }
    else if(step === 5){
        q.innerText = "Tighy está en tu casa";
    }
}
</script>

</body>
</html>
