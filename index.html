<!DOCTYPE html>
<html>
<head>
<title>Comunidad Tighti</title>

<style>
body{
    margin:0;
    background:linear-gradient(to right, black, #1a001a);
    color:white;
    font-family:Arial;
    text-align:center;
    overflow:hidden;
}

/* TITULO NEON SOLO INICIO */
.neon{
    text-shadow:0 0 10px #ff00ff,0 0 20px #00ffff;
}

.container{
    display:flex;
    justify-content:center;
    gap:40px;
    margin-top:60px;
}

.card{
    background:#0a0a0a;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 20px #ff00ff,0 0 40px #00ffff;
}

.btn-neon{
    padding:12px 25px;
    border-radius:20px;
    border:none;
    background:linear-gradient(45deg,#ff00ff,#00ffff);
    color:white;
    cursor:pointer;
    margin-top:20px;
}

/* BOTONES */
.btn-normal{
    padding:12px 25px;
    border-radius:10px;
    border:none;
    background:white;
    color:black;
    cursor:pointer;
    position:absolute;
}

/* NUEVO: BOTONES CENTRADOS */
.botonesCentro{
    position:absolute;
    top:60%;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:20px;
}

/* PANTALLAS */
.screen{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    top:0;
    left:0;
    display:none;
    z-index:200;
}

/* TEXTO CENTRO */
.centerText{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

/* OSCURECER */
.fade{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    top:0;
    left:0;
    opacity:0;
    transition:opacity 2s;
    z-index:100;
    pointer-events:none;
}

/* CARA */
.cara{
    position:absolute;
    bottom:20px;
    right:20px;
    width:150px;
}

/* OJOS */
.ojo{
    position:absolute;
    width:60px;
    opacity:0.5;
}

/* TERMINAL CENTRADA */
.terminal{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    color:#00ff00;
    font-family:monospace;
    padding:20px;
    text-align:left;
    display:none;
    z-index:300;

    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* TEXTOS ROJOS */
.rojo{
    position:absolute;
    color:red;
    font-size:22px;
    z-index:400;
}

/* FINAL */
.final{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    color:red;
    display:none;
    justify-content:center;
    align-items:center;
    font-size:40px;
    z-index:500;
}
</style>
</head>

<body>

<h1 class="neon" id="titulo">Bienvenido a la comunidad de Tighti</h1>

<div class="container" id="menu">
    <div class="card">
        <h2>Discord</h2>
        <a href="https://discord.gg/cruqhYg5">Unirse</a>
    </div>

    <div class="card">
        <h2>Twitch</h2>
        <a href="https://www.twitch.tv/tighty1">Ver canal</a>
    </div>
</div>

<button class="btn-neon" onclick="pantalla1()" id="btnInicio">Conocer más</button>

<div class="fade" id="fade"></div>

<!-- PANTALLA 1 -->
<div class="screen" id="s1">
    <h1 class="centerText">¿Quieres conocer más?</h1>
    <button class="btn-normal left" onclick="pantalla2()">Sí</button>
    <button class="btn-normal right" id="no1">No</button>
    <img src="cara.png" class="cara">
    <audio id="musica" loop>
        <source src="musica.mp3">
    </audio>
</div>

<!-- PANTALLA 2 (ARREGLADA) -->
<div class="screen" id="s2">
    <h1 class="centerText">¿Estás seguro que quieres conocer más?</h1>

    <div class="botonesCentro">
        <button class="btn-normal" onclick="terminal()">Sí</button>
        <button class="btn-normal" id="no2">No</button>
    </div>
</div>

<!-- TERMINAL -->
<div class="terminal" id="terminal"></div>

<!-- FINAL -->
<div class="final" id="final">
    YA NO PUEDES SALIR
</div>

<script>
let fade=document.getElementById("fade");

function oscurecer(callback){
    fade.style.opacity="1";
    setTimeout(()=>{
        callback();
        setTimeout(()=>{
            fade.style.opacity="0";
        },500);
    },2000);
}

function pantalla1(){
    oscurecer(()=>{
        document.getElementById("menu").style.display="none";
        document.getElementById("titulo").style.display="none";
        document.getElementById("btnInicio").style.display="none";
        document.getElementById("s1").style.display="block";
        document.getElementById("musica").play();
    });
}

function pantalla2(){
    oscurecer(()=>{
        document.getElementById("s1").style.display="none";
        document.getElementById("s2").style.display="block";
        crearOjos();
    });
}

function terminal(){
    oscurecer(()=>{
        document.getElementById("s2").style.display="none";
        document.getElementById("terminal").style.display="flex";
        escribirTerminal();
    });
}

/* BOTON NO */
function mover(btn){
    btn.style.left=Math.random()*window.innerWidth+"px";
    btn.style.top=Math.random()*window.innerHeight+"px";
}

document.addEventListener("mouseover",function(e){
    if(e.target.id=="no1" || e.target.id=="no2"){
        mover(e.target);
    }
});

/* OJOS */
function crearOjos(){
    let s2=document.getElementById("s2");
    for(let i=0;i<25;i++){
        let ojo=document.createElement("img");
        ojo.src="ojo.png";
        ojo.className="ojo";
        ojo.style.left=Math.random()*window.innerWidth+"px";
        ojo.style.top=Math.random()*window.innerHeight+"px";
        s2.appendChild(ojo);
    }
}

/* TERMINAL */
function escribirTerminal(){
    let lineas=[
        "Conectando...",
        "Accediendo al sistema...",
        "Usuario detectado...",
        "Descargando archivos...",
        "Instalando virus...",
        "ERROR...",
        "No debiste entrar aqui..."
    ];

    let term=document.getElementById("terminal");
    let i=0;

    function escribirLinea(){
        if(i>=lineas.length){
            textosRojos();
            return;
        }

        let div=document.createElement("div");
        term.appendChild(div);

        let j=0;
        let inter=setInterval(()=>{
            div.textContent+=lineas[i][j];
            j++;

            if(j>=lineas[i].length){
                clearInterval(inter);
                i++;
                setTimeout(escribirLinea,500);
            }
        },40);
    }

    escribirLinea();
}

/* TEXTOS ROJOS */
function textosRojos(){
    let mensajes=[
        "Te estamos observando",
        "No puedes salir",
        "Ya es tarde",
        "Nunca debiste entrar",
        "Sabemos quien eres",
        "Tu camara esta activa"
    ];

    let contador=0;

    let intervalo=setInterval(()=>{
        let t=document.createElement("div");
        t.className="rojo";
        t.textContent=mensajes[Math.floor(Math.random()*mensajes.length)];
        t.style.left=Math.random()*window.innerWidth+"px";
        t.style.top=Math.random()*window.innerHeight+"px";
        document.body.appendChild(t);

        contador++;

        if(contador>=20){
            clearInterval(intervalo);
            finalMiedo();
        }
    },600);
}

function finalMiedo(){
    setTimeout(()=>{
        document.getElementById("final").style.display="flex";
    },2000);

    setTimeout(()=>{
        window.close();
    },6000);
}
</script>

</body>
</html>
