<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APOCALIPSIS TIGHTY</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Creepster&family=Press+Start+2P&display=swap');
:root { --blood:#8b0000; --green:#39ff14; --purple:#7b2fff; }
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#000; display:flex; align-items:center; justify-content:center;
  min-height:100vh; font-family:'Press Start 2P',monospace; overflow:hidden;
}
#wrapper { position:relative; width:520px; height:640px; }
canvas {
  display:block; image-rendering:pixelated;
  border:3px solid var(--blood);
  box-shadow:0 0 40px #8b000099,0 0 80px #8b000033;
  cursor:crosshair;
}
#hud {
  position:absolute; top:0; left:0; width:100%;
  pointer-events:none; padding:8px 12px;
  display:flex; justify-content:space-between; align-items:flex-start;
}
#hud-left { display:flex; flex-direction:column; gap:4px; }
.hl { color:var(--green); font-size:7px; text-shadow:0 0 6px var(--green); }
#reload-txt { color:#ff4400; font-size:7px; display:none; animation:blink .4s infinite; }
#wave-center {
  position:absolute; top:8px; left:50%; transform:translateX(-50%);
  color:#ff4400; font-size:8px; text-shadow:0 0 10px #ff4400; white-space:nowrap;
}
#ammo-bar { display:flex; gap:2px; flex-wrap:wrap; max-width:90px; margin-top:2px; }
.bd { width:5px; height:9px; background:#ffdd00; box-shadow:0 0 4px #ffdd00; }
.bd.e { background:#2a2a2a; box-shadow:none; }
#speech {
  position:absolute; bottom:50px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,.9); border:2px solid var(--purple);
  box-shadow:0 0 14px var(--purple); padding:8px 14px;
  color:#fff; font-family:'Creepster',cursive; font-size:15px;
  max-width:400px; text-align:center; border-radius:4px;
  pointer-events:none; opacity:0; transition:opacity .3s; z-index:10;
  white-space:nowrap;
}
#speech.show { opacity:1; }
#speech::after {
  content:''; position:absolute; bottom:-10px; left:50%; transform:translateX(-50%);
  border:5px solid transparent; border-top-color:var(--purple);
}
#wann {
  position:absolute; top:38%; left:50%; transform:translate(-50%,-50%);
  font-family:'Creepster',cursive; font-size:50px; color:#ff2200;
  text-shadow:0 0 30px #ff2200,0 0 60px #ff220055;
  pointer-events:none; opacity:0; z-index:15; text-align:center;
  white-space:nowrap; transition:opacity .4s;
}
#wann.show { opacity:1; }
#overlay {
  position:absolute; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,.9); display:flex; flex-direction:column;
  align-items:center; justify-content:center; z-index:20; cursor:pointer;
}
#overlay.hidden { display:none; }
.o-title {
  font-family:'Creepster',cursive; font-size:28px; color:#ff2200;
  text-shadow:0 0 20px #ff2200,3px 3px 0 #600; letter-spacing:3px;
  animation:flicker 2.5s infinite; text-align:center; line-height:1.3;
}
.o-sub { font-family:'Creepster',cursive; font-size:22px; color:var(--green); text-shadow:0 0 10px var(--green); margin-top:6px; }
.o-instr { margin-top:18px; color:#999; font-size:6px; line-height:2.4; text-align:center; }
.o-tap { margin-top:20px; color:#fff; font-size:8px; animation:blink .9s infinite; }
.o-score { color:#ffdd00; font-size:13px; text-shadow:0 0 10px #ffdd00; margin-top:10px; }
.o-detail { color:#aaa; font-size:6px; margin-top:8px; }
@keyframes flicker { 0%,100%{opacity:1}92%{opacity:1}93%{opacity:.3}95%{opacity:1}97%{opacity:.5}98%{opacity:1} }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:0} }
</style>
</head>
<body>
<div id="wrapper">
  <canvas id="c" width="520" height="600"></canvas>
  <div id="hud">
    <div id="hud-left">
      <div class="hl">❤️ <span id="hpn">100</span></div>
      <div class="hl">💀 <span id="killn">0</span></div>
      <div id="reload-txt">⟳ RECARGANDO...</div>
      <div id="ammo-bar"></div>
    </div>
    <div id="wave-center">OLEADA <span id="waven">1</span></div>
    <div class="hl">🏆 <span id="scoren">0</span></div>
  </div>
  <div id="speech"></div>
  <div id="wann"></div>
  <div id="overlay">
    <div class="o-title">☠ APOCALIPSIS<br>TIGHTY ☠</div>
    <div class="o-sub">— Sobrevive la horda —</div>
    <div class="o-instr">
      WASD / FLECHAS → MOVER<br>
      MOUSE → APUNTAR<br>
      CLICK → DISPARAR (mantén para ráfaga)<br>
      R → RECARGAR
    </div>
    <div class="o-tap">[ CLICK PARA EMPEZAR ]</div>
  </div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W=520, H=600;

const QUOTES = [
  "¡Señor, dame puntería!",
  "¡Por la santa serpiente morada!",
  "¡Amén... y recarga!",
  "¡No temo a la muerte, temo quedarme sin balas!",
  "¡Santa Oscuridad, guía mis balas!",
  "¡Padre nuestro que estás en el cielo... MUERE ZOMBIE!",
  "¡Aleluya! ¡Cabeza volada!",
  "¡Bendito sea este cargador!",
  "¡El Señor es mi pastor y yo soy el exterminador!",
  "¡Esto no lo pedí en mis oraciones... o sí!",
  "¡Que Dios se apiade de sus almas podridas!",
  "¡Una bala por cada pecado!",
  "¡Hoy el apocalipsis me encontró preparado!",
];
const BETWEEN_QUOTES = [
  "¡Dios mío, vienen más!","¡Recarga y ora, soldado!",
  "¡La horda no descansa!","¡Prepárate para el juicio!","¡Más zombies, más gloria!",
];

let state='menu', score=0, kills=0, wave=1, frameCount=0;
let speechTimer=0, betweenTimer=0, wannTimer=0, mouseDown=false;

const P = {
  x:W/2, y:H/2, vx:0, vy:0,
  r:13, accel:0.6, friction:0.76, maxSpeed:3.8,
  angle:0, hp:100, maxHp:100,
  ammo:15, maxAmmo:15,
  reloading:false, reloadTimer:0, reloadTime:90,
  shootCD:0, shootRate:8, invincible:0,
};
let zombies=[], bullets=[], particles=[], decals=[];
const keys={};
const mouse={x:W/2, y:H/2};

// INPUT
document.addEventListener('keydown', e=>{
  keys[e.code]=true;
  if(e.code==='KeyR'&&state==='playing'&&!P.reloading&&P.ammo<P.maxAmmo) reload();
  if(e.code==='Space') e.preventDefault();
});
document.addEventListener('keyup', e=>{ keys[e.code]=false; });
canvas.addEventListener('mousemove', e=>{
  const r=canvas.getBoundingClientRect();
  mouse.x=(e.clientX-r.left)*(W/r.width);
  mouse.y=(e.clientY-r.top)*(H/r.height);
});
canvas.addEventListener('mousedown', ()=>{ mouseDown=true; if(state==='playing') shoot(); });
canvas.addEventListener('mouseup',   ()=>{ mouseDown=false; });
document.getElementById('overlay').addEventListener('click', ()=>{
  if(state==='menu'||state==='dead') startGame();
});

// HELPERS
function showSpeech(txt){
  const el=document.getElementById('speech');
  el.textContent='"'+txt+'"';
  el.classList.add('show');
  speechTimer=200;
}
function showWann(txt){
  const el=document.getElementById('wann');
  el.textContent=txt;
  el.classList.add('show');
  wannTimer=130;
}
function updateAmmoBar(){
  const bar=document.getElementById('ammo-bar');
  bar.innerHTML='';
  for(let i=0;i<P.maxAmmo;i++){
    const d=document.createElement('div');
    d.className='bd'+(i<P.ammo?'':' e');
    bar.appendChild(d);
  }
}
function spawnPart(x,y,col,n=6,sz=3){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, sp=Math.random()*3+1;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,col,sz:sz+Math.random()*2});
  }
}
function spawnBlood(x,y){
  decals.push({x,y,rx:5+Math.random()*10,ry:3+Math.random()*7,a:.7});
  spawnPart(x,y,'#aa0000',10,4);
}

// GAME FLOW
function startGame(){
  state='playing'; score=0; kills=0; wave=1; frameCount=0;
  Object.assign(P,{x:W/2,y:H/2,vx:0,vy:0,hp:P.maxHp,ammo:P.maxAmmo,reloading:false,invincible:0,shootCD:0});
  zombies=[];bullets=[];particles=[];decals=[];
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('hpn').textContent=P.hp;
  document.getElementById('killn').textContent=0;
  document.getElementById('scoren').textContent=0;
  document.getElementById('waven').textContent=1;
  document.getElementById('reload-txt').style.display='none';
  updateAmmoBar();
  showWann('☠ OLEADA 1 ☠');
  spawnWave(1);
  showSpeech("¡Que empiece el apocalipsis!");
}

function endGame(){
  state='dead';
  const ov=document.getElementById('overlay');
  ov.classList.remove('hidden');
  ov.innerHTML=`
    <div class="o-title">GAME OVER</div>
    <div class="o-sub" style="color:#ff4400">☠ TIGHTY CAYÓ ☠</div>
    <div class="o-score">SCORE: ${score}</div>
    <div class="o-detail">OLEADA ${wave} &nbsp;|&nbsp; BAJAS: ${kills}</div>
    <div class="o-tap" style="margin-top:22px">[ CLICK PARA REINTENTAR ]</div>`;
  ov.addEventListener('click',()=>{ if(state==='dead') startGame(); },{once:true});
}

function nextWave(){
  wave++;
  document.getElementById('waven').textContent=wave;
  state='between'; betweenTimer=200;
  showWann('☠ OLEADA '+wave+' ☠');
  showSpeech(BETWEEN_QUOTES[Math.floor(Math.random()*BETWEEN_QUOTES.length)]);
}

function spawnWave(w){
  // Gentle scaling: starts with 4, +2 per wave, cap 22
  const count=Math.min(4+(w-1)*2, 22);
  for(let i=0;i<count;i++){
    setTimeout(()=>{
      if(state!=='playing'&&state!=='between') return;
      const side=Math.floor(Math.random()*4);
      let x,y;
      if     (side===0){x=Math.random()*W;y=-25;}
      else if(side===1){x=W+25;y=Math.random()*H;}
      else if(side===2){x=Math.random()*W;y=H+25;}
      else             {x=-25;y=Math.random()*H;}
      const big=w>=3&&Math.random()<0.15;
      zombies.push({
        x,y,r:big?16:12,
        hp:big?3+Math.floor(w/2):1+Math.floor(w/4),
        maxHp:big?3+Math.floor(w/2):1+Math.floor(w/4),
        speed:(big?0.55:0.75)+w*0.04+Math.random()*0.2,
        angle:0,wobble:Math.random()*Math.PI*2,big,
      });
    }, i*350);
  }
}

// SHOOT / RELOAD
function shoot(){
  if(P.reloading||P.ammo<=0||P.shootCD>0) return;
  const gd=24;
  const bx=P.x+Math.cos(P.angle)*gd, by=P.y+Math.sin(P.angle)*gd;
  bullets.push({x:bx,y:by,vx:Math.cos(P.angle)*13,vy:Math.sin(P.angle)*13,life:60});
  P.ammo--; P.shootCD=P.shootRate;
  updateAmmoBar();
  spawnPart(bx,by,'#ffcc00',3,2);
  if(P.ammo<=0) reload();
}
function reload(){
  if(P.reloading||P.ammo===P.maxAmmo) return;
  P.reloading=true; P.reloadTimer=P.reloadTime;
  document.getElementById('reload-txt').style.display='block';
  showSpeech("¡Recargando... Dios dame tiempo!");
}

// UPDATE
function update(){
  if(state!=='playing') return;
  frameCount++;

  // Aim — gun points directly at mouse cursor
  P.angle=Math.atan2(mouse.y-P.y, mouse.x-P.x);

  // Smooth movement
  let ix=0,iy=0;
  if(keys['KeyW']||keys['ArrowUp'])    iy-=1;
  if(keys['KeyS']||keys['ArrowDown'])  iy+=1;
  if(keys['KeyA']||keys['ArrowLeft'])  ix-=1;
  if(keys['KeyD']||keys['ArrowRight']) ix+=1;
  if(ix&&iy){ix*=0.707;iy*=0.707;}
  P.vx=(P.vx+ix*P.accel)*P.friction;
  P.vy=(P.vy+iy*P.accel)*P.friction;
  const spd=Math.sqrt(P.vx*P.vx+P.vy*P.vy);
  if(spd>P.maxSpeed){P.vx=P.vx/spd*P.maxSpeed;P.vy=P.vy/spd*P.maxSpeed;}
  P.x=Math.max(P.r,Math.min(W-P.r,P.x+P.vx));
  P.y=Math.max(P.r,Math.min(H-P.r,P.y+P.vy));

  if(mouseDown&&!P.reloading) shoot();
  if(P.shootCD>0) P.shootCD--;

  // Reload timer
  if(P.reloading){
    P.reloadTimer--;
    if(P.reloadTimer<=0){
      P.reloading=false;P.ammo=P.maxAmmo;
      document.getElementById('reload-txt').style.display='none';
      updateAmmoBar();
      showSpeech("¡Recargado! ¡Aleluya!");
    }
  }
  if(P.invincible>0) P.invincible--;

  // Bullets
  bullets.forEach(b=>{b.x+=b.vx;b.y+=b.vy;b.life--;});
  bullets=bullets.filter(b=>b.life>0&&b.x>-20&&b.x<W+20&&b.y>-20&&b.y<H+20);

  // Zombies move + hit player
  for(let zi=zombies.length-1;zi>=0;zi--){
    const z=zombies[zi];
    const ddx=P.x-z.x,ddy=P.y-z.y;
    const dist=Math.sqrt(ddx*ddx+ddy*ddy)||1;
    z.angle=Math.atan2(ddy,ddx)-Math.PI/2;
    z.x+=(ddx/dist)*z.speed;
    z.y+=(ddy/dist)*z.speed;
    z.wobble+=0.06;
    if(dist<P.r+z.r&&P.invincible<=0){
      P.hp=Math.max(0,P.hp-(z.big?12:6));
      P.invincible=80;
      document.getElementById('hpn').textContent=P.hp;
      spawnPart(P.x,P.y,'#ff0000',12,5);
      if(P.hp<=0){endGame();return;}
    }
  }

  // Bullet vs zombie
  for(let bi=bullets.length-1;bi>=0;bi--){
    const b=bullets[bi];
    for(let zi=zombies.length-1;zi>=0;zi--){
      const z=zombies[zi];
      const ddx=b.x-z.x,ddy=b.y-z.y;
      if(ddx*ddx+ddy*ddy<(z.r+4)**2){
        z.hp--;
        spawnBlood(z.x+Math.random()*8-4,z.y+Math.random()*8-4);
        bullets.splice(bi,1);
        if(z.hp<=0){
          spawnBlood(z.x,z.y);
          decals.push({x:z.x,y:z.y,rx:12+Math.random()*8,ry:7+Math.random()*6,a:.75});
          zombies.splice(zi,1);
          kills++;score+=10*wave;
          document.getElementById('killn').textContent=kills;
          document.getElementById('scoren').textContent=score;
        }
        break;
      }
    }
  }

  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.life-=0.055;});
  particles=particles.filter(p=>p.life>0);

  if(speechTimer>0&&--speechTimer===0) document.getElementById('speech').classList.remove('show');
  if(wannTimer>0&&--wannTimer===0)     document.getElementById('wann').classList.remove('show');

  if(zombies.length===0) nextWave();

  if(state==='playing'&&Math.random()<0.0025)
    showSpeech(QUOTES[Math.floor(Math.random()*QUOTES.length)]);
}

function updateBetween(){
  if(state!=='between') return;
  if(speechTimer>0&&--speechTimer===0) document.getElementById('speech').classList.remove('show');
  if(wannTimer>0&&--wannTimer===0)     document.getElementById('wann').classList.remove('show');
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=0.05;});
  particles=particles.filter(p=>p.life>0);
  if(--betweenTimer<=0){state='playing';spawnWave(wave);}
}

// DRAW
function drawFloor(){
  const T=40;
  for(let ty=0;ty<Math.ceil(H/T)+1;ty++)
    for(let tx=0;tx<Math.ceil(W/T)+1;tx++){
      ctx.fillStyle=(tx+ty)%2===0?'#0c1809':'#0a1507';
      ctx.fillRect(tx*T,ty*T,T,T);
    }
  ctx.strokeStyle='rgba(40,70,20,.2)';ctx.lineWidth=1;
  for(let tx=0;tx<=W;tx+=T){ctx.beginPath();ctx.moveTo(tx,0);ctx.lineTo(tx,H);ctx.stroke();}
  for(let ty=0;ty<=H;ty+=T){ctx.beginPath();ctx.moveTo(0,ty);ctx.lineTo(W,ty);ctx.stroke();}
}

function drawDecals(){
  decals.forEach(d=>{
    ctx.globalAlpha=d.a*.5;ctx.fillStyle='#550000';
    ctx.beginPath();ctx.ellipse(d.x,d.y,d.rx,d.ry,0,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;
}

function drawZombie(z){
  const s=z.big?1.35:1;
  ctx.save();
  ctx.translate(Math.round(z.x),Math.round(z.y));
  ctx.rotate(z.angle);
  ctx.globalAlpha=.3;ctx.fillStyle='#000';
  ctx.beginPath();ctx.ellipse(0,6*s,10*s,4*s,0,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
  ctx.fillStyle=z.big?'#1e3a12':'#2e4a1e';
  ctx.fillRect(-7*s,-10*s,14*s,17*s);
  ctx.fillStyle='#162a0e';
  ctx.fillRect(-5*s,-4*s,3*s,2*s);ctx.fillRect(2*s,-2*s,3*s,2*s);
  ctx.fillStyle='#3a5428';ctx.fillRect(-6*s,-19*s,12*s,11*s);
  ctx.fillStyle='#0a0500';
  ctx.fillRect(-4*s,-16*s,3*s,3*s);ctx.fillRect(1*s,-16*s,3*s,3*s);
  ctx.fillStyle='#ff0000';
  ctx.fillRect(-3*s,-16*s,2*s,2*s);ctx.fillRect(2*s,-16*s,2*s,2*s);
  ctx.fillStyle='#0a0500';ctx.fillRect(-3*s,-11*s,6*s,3*s);
  ctx.fillStyle='#990000';ctx.fillRect(-2*s,-11*s,4*s,2*s);
  const wo=Math.sin(z.wobble+frameCount*.14)*3;
  ctx.fillStyle='#2e4a1e';
  ctx.fillRect(-13*s,(-9+wo)*s,6*s,4*s);ctx.fillRect(7*s,(-9-wo)*s,6*s,4*s);
  ctx.fillStyle='#3a5428';
  ctx.fillRect(-13*s,(-5+wo)*s,6*s,3*s);ctx.fillRect(7*s,(-5-wo)*s,6*s,3*s);
  ctx.fillStyle='#1e2e10';
  ctx.fillRect(-6*s,7*s,5*s,9*s);ctx.fillRect(1*s,7*s,5*s,9*s);
  if(z.hp<z.maxHp&&z.maxHp>1){
    const bw=22*s;
    ctx.fillStyle='#222';ctx.fillRect(-bw/2,-25*s,bw,3*s);
    ctx.fillStyle='#00ff44';ctx.fillRect(-bw/2,-25*s,bw*(z.hp/z.maxHp),3*s);
  }
  ctx.restore();
}

function drawPlayer(){
  if(P.invincible>0&&Math.floor(frameCount/4)%2===0) return;
  ctx.save();
  ctx.translate(Math.round(P.x),Math.round(P.y));
  // Rotate so gun muzzle faces the mouse
  ctx.rotate(P.angle+Math.PI/2);
  ctx.globalAlpha=.3;ctx.fillStyle='#000';
  ctx.beginPath();ctx.ellipse(0,8,13,5,0,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
  // body
  ctx.fillStyle='#111';ctx.fillRect(-8,-10,16,20);
  // hood
  ctx.fillStyle='#111';ctx.beginPath();ctx.arc(0,-8,10,0,Math.PI*2);ctx.fill();
  // bear ears
  ctx.fillRect(-13,-19,7,7);ctx.fillRect(6,-19,7,7);
  ctx.fillStyle='#2a2a2a';ctx.fillRect(-11,-17,4,4);ctx.fillRect(7,-17,4,4);
  // face
  ctx.fillStyle='#c4826a';ctx.beginPath();ctx.arc(0,-8,6,0,Math.PI*2);ctx.fill();
  // headband
  ctx.fillStyle='#777';ctx.fillRect(-6,-11,12,3);
  ctx.fillStyle='#bbb';ctx.fillRect(-1,-12,2,3);
  // eyes
  ctx.fillStyle='#cc1111';ctx.fillRect(-4,-11,2,2);ctx.fillRect(2,-11,2,2);
  // serpent
  ctx.fillStyle='#6622bb';
  ctx.beginPath();ctx.ellipse(-7,1,4,3,.3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(7,-1,4,3,-.3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#7b2fff';ctx.fillRect(-5,-2,10,5);
  // GUN (points up = toward mouse in world space)
  ctx.fillStyle='#555';ctx.fillRect(-2,-24,4,14);
  ctx.fillStyle='#333';ctx.fillRect(-3,-10,6,6);
  ctx.fillStyle='#666';ctx.fillRect(-1,-28,2,6);
  ctx.restore();

  // Subtle aiming line from muzzle toward target
  ctx.save();
  ctx.globalAlpha=0.15;
  ctx.strokeStyle='#fff';ctx.lineWidth=1;
  ctx.setLineDash([4,10]);
  ctx.beginPath();
  ctx.moveTo(P.x+Math.cos(P.angle)*26, P.y+Math.sin(P.angle)*26);
  ctx.lineTo(P.x+Math.cos(P.angle)*100, P.y+Math.sin(P.angle)*100);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawBullets(){
  bullets.forEach(b=>{
    ctx.save();
    ctx.shadowColor='#ffcc00';ctx.shadowBlur=8;
    ctx.fillStyle='#ffee44';
    ctx.beginPath();ctx.arc(b.x,b.y,3.5,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;ctx.restore();
  });
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha=p.life;ctx.fillStyle=p.col;
    ctx.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);
  });
  ctx.globalAlpha=1;
}

function drawHPBar(){
  const bw=120,bh=10,bx=12,by=H-20;
  ctx.fillStyle='#1a0000';ctx.fillRect(bx,by,bw,bh);
  const ratio=P.hp/P.maxHp;
  ctx.fillStyle=ratio>.6?'#00cc44':ratio>.3?'#ff8800':'#ff2200';
  ctx.fillRect(bx,by,bw*ratio,bh);
  ctx.strokeStyle='#444';ctx.lineWidth=1;ctx.strokeRect(bx,by,bw,bh);
}

function render(){
  ctx.clearRect(0,0,W,H);
  drawFloor();drawDecals();
  zombies.forEach(drawZombie);
  drawBullets();drawParticles();drawPlayer();drawHPBar();
  if(state==='between'){
    ctx.fillStyle='rgba(0,0,0,.4)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ffcc00';ctx.font='8px "Press Start 2P"';
    ctx.textAlign='center';
    ctx.fillText('PRÓXIMA OLEADA EN '+Math.ceil(betweenTimer/60)+'...',W/2,H/2+60);
    ctx.textAlign='left';
  }
}

function loop(){ update();updateBetween();render();requestAnimationFrame(loop); }
updateAmmoBar();
loop();
</script>
</body>
