
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
#game{background:#000;min-height:640px;display:flex;flex-direction:column;align-items:center;font-family:'Press Start 2P',monospace;color:#fff;padding:16px;position:relative;overflow:hidden;image-rendering:pixelated}
#scanlines{pointer-events:none;position:fixed;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.07) 0px,rgba(0,0,0,0.07) 1px,transparent 1px,transparent 2px);z-index:999}
#screen{width:100%;max-width:660px;position:relative}
#top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;border:1.5px solid #222;padding:6px 10px}
#top-bar .lbl{font-size:6px;color:#555}
#hp-bar{flex:1;margin:0 10px;height:7px;background:#111;border:1px solid #333}
#hp-fill{height:100%;background:linear-gradient(90deg,#7b0066,#ff44cc);transition:width 0.4s}
#affection-num{font-size:7px;color:#ff44cc;min-width:60px;text-align:right}
#stage{display:flex;justify-content:center;align-items:flex-end;min-height:280px;position:relative;margin-bottom:0;background:radial-gradient(ellipse at 50% 100%, #0d0010 0%, #000 70%)}
#haunter-wrap{position:absolute;right:10px;bottom:30px;animation:hfloat 2.2s ease-in-out infinite}
@keyframes hfloat{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-12px) rotate(2deg)}}
#tighty-wrap{position:relative;animation:tidle 1.8s ease-in-out infinite}
@keyframes tidle{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.shake{animation:shk 0.3s !important}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.bounce{animation:bnc 0.4s !important}
@keyframes bnc{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
#dialog-box{border:3px solid #fff;background:#000;padding:14px 18px 24px;position:relative;min-height:88px;width:100%;margin-top:0}
#dialog-box::after{content:'▼';position:absolute;bottom:6px;right:12px;font-size:8px;color:#fff;animation:blink 0.8s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
#dname{font-size:8px;color:#ff44cc;margin-bottom:7px;letter-spacing:2px;text-shadow:0 0 6px #ff44cc88}
#dtext{font-size:8px;line-height:1.9;color:#fff;min-height:48px;white-space:pre-wrap}
#opts{width:100%;max-width:660px;display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:9px}
.opt{background:#000;border:1.5px solid #333;color:#ccc;font-family:'Press Start 2P',monospace;font-size:6px;padding:9px 11px;text-align:left;cursor:pointer;transition:all 0.12s;line-height:1.8;position:relative}
.opt::before{content:'* ';color:#ff44cc}
.opt:hover{border-color:#ff44cc;color:#fff;background:#100010;transform:translateX(2px)}
.opt:active{transform:scale(0.97)}
#hearts-row{display:flex;gap:3px;justify-content:center;margin:6px 0 4px;font-size:11px}
.hrt{color:#333;transition:all 0.3s}
.hrt.on{color:#ff44cc;text-shadow:0 0 4px #ff44cc}
#q-label{font-size:6px;color:#444;text-align:center;margin-bottom:5px;letter-spacing:1px}
#end{display:none;flex-direction:column;align-items:center;text-align:center;gap:14px;padding:24px 10px;min-height:400px;justify-content:center}
#end-title{font-size:11px;line-height:1.8;animation:glow 1.4s ease-in-out infinite}
@keyframes glow{0%,100%{text-shadow:0 0 6px currentColor}50%{text-shadow:0 0 18px currentColor,0 0 30px currentColor}}
#end-msg{font-size:6.5px;color:#bbb;line-height:2.2;max-width:420px;white-space:pre-wrap}
#end-score{font-size:8px;margin-top:4px}
#rbtn{background:#000;border:2px solid #ff44cc;color:#ff44cc;font-family:'Press Start 2P',monospace;font-size:7px;padding:12px 20px;cursor:pointer;margin-top:8px;transition:all 0.15s}
#rbtn:hover{background:#ff44cc;color:#000}
#reaction-tag{font-size:7px;padding:4px 10px;border:1px solid;margin-bottom:6px;display:none;align-self:flex-start;margin-left:0}
.rtg-good{color:#44ffaa;border-color:#44ffaa}
.rtg-mid{color:#ffcc44;border-color:#ffcc44}
.rtg-bad{color:#ff4444;border-color:#ff4444}
#skip-hint{position:absolute;bottom:7px;left:12px;font-size:5px;color:#333;cursor:pointer;background:none;border:none;font-family:'Press Start 2P',monospace}
#skip-hint:hover{color:#777}
</style>

<script>
const AC = window.AudioContext || window.webkitAudioContext;
let ac = null;
let skipping = false, isTyping = false, tiv = null;

function initAC(){if(!ac)ac=new AC();}

function playMsg(){
  if(!ac)return;
  const o=ac.createOscillator(),g=ac.createGain();
  o.connect(g);g.connect(ac.destination);
  o.type='square';
  const f=380+Math.random()*160;
  o.frequency.setValueAtTime(f,ac.currentTime);
  o.frequency.exponentialRampToValueAtTime(f*0.85,ac.currentTime+0.05);
  g.gain.setValueAtTime(0.035,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.07);
  o.start(ac.currentTime);o.stop(ac.currentTime+0.07);
}

function playGood(){
  if(!ac)return;
  [523,659,784,1047].forEach((f,i)=>{
    const o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.type='square';o.frequency.value=f;
    const t=ac.currentTime+i*0.1;
    g.gain.setValueAtTime(0.04,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.14);
    o.start(t);o.stop(t+0.14);
  });
}

function playBad(){
  if(!ac)return;
  [280,220,180].forEach((f,i)=>{
    const o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.type='sawtooth';o.frequency.value=f;
    const t=ac.currentTime+i*0.11;
    g.gain.setValueAtTime(0.04,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.13);
    o.start(t);o.stop(t+0.13);
  });
}

function playMid(){
  if(!ac)return;
  [400,500].forEach((f,i)=>{
    const o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.type='triangle';o.frequency.value=f;
    const t=ac.currentTime+i*0.12;
    g.gain.setValueAtTime(0.035,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
    o.start(t);o.stop(t+0.15);
  });
}

let aff=0, qi=0;

function hearts(){
  const h=document.getElementById('hearts-row');
  const filled=Math.min(12,Math.floor((aff/144)*12));
  h.innerHTML='';
  for(let i=0;i<12;i++){
    const s=document.createElement('span');
    s.className='hrt'+(i<filled?' on':'');
    s.textContent='♥';
    h.appendChild(s);
  }
}

function ui(){
  document.getElementById('hp-fill').style.width=Math.min(100,(aff/144)*100)+'%';
  document.getElementById('affection-num').textContent=aff+' / 144';
  document.getElementById('q-label').textContent='PREGUNTA '+qi+' / '+Qs.length;
  hearts();
}

  const el=document.getElementById('dtext');
  el.textContent='';
  isTyping=true; skipping=false;
  let i=0,last=0;
  clearInterval(tiv);
  tiv=setInterval(()=>{
    if(skipping){clearInterval(tiv);el.textContent=txt;isTyping=false;skipping=false;if(cb)cb();return;}
    if(i<txt.length){
      el.textContent+=txt[i];
      const now=Date.now();
      if(txt[i]!='\n'&&txt[i]!=' '&&now-last>45){playMsg();last=now;}
      i++;
    }else{clearInterval(tiv);isTyping=false;if(cb)cb();}
  },42);
}

function doSkip(){if(isTyping)skipping=true;}

function anim(id,cls){
  const el=document.getElementById(id);
  el.classList.remove('shake','bounce');
  void el.offsetWidth;
  el.classList.add(cls);
  setTimeout(()=>el.classList.remove(cls),400);
}

function showOpts(){
  const q=Qs[qi];
  const a=document.getElementById('opts');
  a.innerHTML='';
  q.o.forEach((opt,i)=>{
    const b=document.createElement('button');
    b.className='opt';
    b.textContent=opt.t;
    b.onclick=()=>pick(i);
    a.appendChild(b);
  });
}

function pick(i){
  initAC();
  const q=Qs[qi];
  const pts=q.o[i].p;
  aff+=pts; qi++;
  document.getElementById('opts').innerHTML='';
  ui();
  let reaction,rtgCls;
  if(pts>=12){playGood();reaction=["...*suspiro suave*","Bien dicho.","Eso... estuvo bien.","Hmm. Interesante."][Math.floor(Math.random()*4)];rtgCls='rtg-good';anim('tighty-wrap','bounce');}
  else if(pts>=7){playMid();reaction=["...","Ya veo.","Está bien.","Continúa."][Math.floor(Math.random()*4)];rtgCls='rtg-mid';}
  else{playBad();reaction=["...","Esperaba más.","Mmm.","...sí."][Math.floor(Math.random()*4)];rtgCls='rtg-bad';anim('tighty-wrap','shake');}

  type(reaction,()=>{
    setTimeout(()=>{
      if(qi>=Qs.length)ending();
      else{type(Qs[qi].d,showOpts);}
    },650);
  });
}

function ending(){
  document.getElementById('opts').innerHTML='';
  document.getElementById('dialog-box').style.display='none';
  document.getElementById('stage').style.display='none';
  document.getElementById('hearts-row').style.display='none';
  document.getElementById('q-label').style.display='none';
  document.getElementById('top-bar').style.display='none';

  const e=ENDS.find(x=>aff>=x.min)||ENDS[ENDS.length-1];
  const es=document.getElementById('end');
  es.style.display='flex';
  document.getElementById('end-title').textContent=e.title;
  document.getElementById('end-title').style.color=e.col;

  const stars=aff>=110?'★★★★★':aff>=75?'★★★★☆':aff>=40?'★★★☆☆':'★☆☆☆☆';
  document.getElementById('end-score').textContent='AFECTO FINAL: '+aff+' / 144   '+stars;
  document.getElementById('end-score').style.color=e.col;

  if(aff>=110)playGood(); else if(aff>=75)playMid(); else playBad();

  let i=0;const txt=e.msg,el=document.getElementById('end-msg');
  el.textContent='';
  const iv=setInterval(()=>{
    if(i<txt.length){el.textContent+=txt[i];if(txt[i]!='\n'&&txt[i]!=' ')playMsg();i++;}
    else clearInterval(iv);
  },40);
}

function restart(){
  aff=0;qi=0;
  document.getElementById('dialog-box').style.display='block';
  document.getElementById('stage').style.display='flex';
  document.getElementById('hearts-row').style.display='flex';
  document.getElementById('q-label').style.display='block';
  document.getElementById('top-bar').style.display='flex';
  document.getElementById('end').style.display='none';
  ui();
  type(Qs[0].d,showOpts);
}

document.getElementById('game').addEventListener('click',initAC,{once:true});
ui();
type("...\n¿Por qué viniste?\nHaunter dijo que eras diferente.\nEso no significa mucho viniendo de él.",()=>{
  setTimeout(()=>type(Qs[0].d,showOpts),800);
});
</script>
